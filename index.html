<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>Post-Xhr-2</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3">
          <div class="card  shadow-lg border border-danger mt-4 ">
            <form class="form-group p-3" id="userForm">
              <div>
                <label class="font-weight-bold" for="title">Title*</label>
                <input required  type="text"  class="form-control" id="title" />
              </div>
              <div>
                <label class="font-weight-bold" for="body">Body*</label>
                <textarea required 
                rows="4"
                  name=""
                  id="body"
                  
                  
                  class="form-control"
                ></textarea>
              </div>
              <div>
                <label class="font-weight-bold" for="">User ID*</label>
                <select required  name="" id="userId" class="form-control">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </div>
              <button class="btn btn-primary btn-sm btn-block mt-2" id="addbt">
                Add User
              </button>
              <button
                type="button"
                class="btn btn-primary btn-sm btn-block mt-2 d-none"
                id="updatId"
              >
                Update User
              </button>
            </form>
          </div>
        </div>
      </div>
      <div class="row mt-5" id="cardContaier">
       
        </div>
      </div>
    </div>

    <div class="spinner d-none" id="spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"></span>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
